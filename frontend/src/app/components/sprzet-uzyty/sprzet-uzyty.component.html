<div class="container mt-32 test-pacjent-fade-in">
  <div class="glass-card shadow-lg p-4 mb-4 rounded-5 test-pacjent-card-fade-in">
    <h2 class="fw-bold mb-4 text-primary-emphasis gradient-text">Sprzęt użyty podczas testów/wizyt</h2>
    <button class="btn btn-gradient mb-3 test-pacjent-btn-fade-in" (click)="openAddModal()">
      <i class="bi bi-plus-circle me-1"></i> Dodaj użycie sprzętu
    </button>
    <div *ngIf="errorMsg" class="alert alert-danger test-pacjent-alert-fade-in">{{errorMsg}}</div>
    <div class="table-responsive">
      <table class="table table-hover table-striped shadow rounded-4 overflow-hidden">
        <thead class="table-primary">
          <tr>
            <th>Sprzęt</th>
            <th>Wizyta</th>
            <th>Ilość</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let su of sprzetUzyty" class="align-middle test-pacjent-row-fade-in">
            <td>{{getSprzetName(su.sprzet_id)}}</td>
            <td>{{getWizytaName(su.wizyta_id)}}</td>
            <td>{{su.ilosc}}</td>
            <td>
              <button class="btn btn-gradient btn-sm me-1" (click)="openEditModal(su)">Edytuj</button>
              <button class="btn btn-danger btn-sm" (click)="confirmDelete(su)">Usuń</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal fade show test-pacjent-modal-fade-in" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showAddModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4 shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title">Dodaj użycie sprzętu</h5>
          <button type="button" class="btn-close" (click)="closeAddModal()"></button>
        </div>
        <div class="modal-body">
          <form (ngSubmit)="saveAdd()">
            <label>Sprzęt:</label>
            <select class="form-select" [(ngModel)]="addForm.sprzet_id" name="sprzet_id" required>
              <option value="">Wybierz</option>
              <option *ngFor="let s of sprzety" [value]="s.sprzet_id">{{s.nazwa}}</option>
            </select>
            <label>Wizyta:</label>
            <select class="form-select" [(ngModel)]="addForm.wizyta_id" name="wizyta_id" required>
              <option value="">Wybierz</option>
              <option *ngFor="let w of wizyty" [value]="w.wizyta_id">{{w.wizyta_id}} ({{w.data}})</option>
            </select>
            <label>Ilość:</label>
            <input class="form-control" type="number" [(ngModel)]="addForm.ilosc" name="ilosc" required />
            <div class="mt-2">
              <button class="btn btn-gradient" type="submit">Zapisz</button>
              <button class="btn btn-secondary" type="button" (click)="closeAddModal()">Anuluj</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade show test-pacjent-modal-fade-in" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showEditModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4 shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title">Edytuj użycie sprzętu</h5>
          <button type="button" class="btn-close" (click)="closeEditModal()"></button>
        </div>
        <div class="modal-body">
          <form (ngSubmit)="saveEdit()">
            <label>Sprzęt:</label>
            <select class="form-select" [(ngModel)]="editForm.sprzet_id" name="edit_sprzet_id" required>
              <option value="">Wybierz</option>
              <option *ngFor="let s of sprzety" [value]="s.sprzet_id">{{s.nazwa}}</option>
            </select>
            <label>Wizyta:</label>
            <select class="form-select" [(ngModel)]="editForm.wizyta_id" name="edit_wizyta_id" required>
              <option value="">Wybierz</option>
              <option *ngFor="let w of wizyty" [value]="w.wizyta_id">{{w.wizyta_id}} ({{w.data}})</option>
            </select>
            <label>Ilość:</label>
            <input class="form-control" type="number" [(ngModel)]="editForm.ilosc" name="edit_ilosc" required />
            <div class="mt-2">
              <button class="btn btn-gradient" type="submit">Zapisz</button>
              <button class="btn btn-secondary" type="button" (click)="closeEditModal()">Anuluj</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
