<div class="container mt-32 test-pacjent-fade-in">
  <div class="glass-card shadow-lg p-4 mb-4 rounded-5 test-pacjent-card-fade-in">
    <h2 class="fw-bold mb-4 text-primary-emphasis gradient-text">Oddziały</h2>
    <button class="btn btn-gradient mb-3 test-pacjent-btn-fade-in" (click)="openAddModal()">
      <i class="bi bi-plus-circle me-1"></i> Dodaj oddział
    </button>
    <div *ngIf="errorMsg" class="alert alert-danger test-pacjent-alert-fade-in">{{ errorMsg }}</div>
    <div class="table-responsive">
      <table class="table table-hover table-striped shadow rounded-4 overflow-hidden">
        <thead class="table-primary">
          <tr>
            <th>Nazwa</th>
            <th>Pielęgniarka ID</th>
            <th>Ordynator ID</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let o of oddzialy" class="align-middle test-pacjent-row-fade-in">
            <td>{{o.nazwa}}</td>
            <td>{{o.pielegniarka_id}}</td>
            <td>{{o.ordynator_id}}</td>
            <td>
              <button class="btn btn-gradient btn-sm me-1" (click)="openEditModal(o)">Edytuj</button>
              <button class="btn btn-danger btn-sm" (click)="confirmDelete(o)">Usuń</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal fade show test-pacjent-modal-fade-in" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showAddModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4 shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title">Dodaj oddział</h5>
          <button type="button" class="btn-close" (click)="closeAddModal()"></button>
        </div>
        <div class="modal-body">
          <form>
            <input class="form-control mb-2" [(ngModel)]="addForm.nazwa" name="nazwa" placeholder="Nazwa">
            <input class="form-control mb-2" [(ngModel)]="addForm.pielegniarka_id" name="pielegniarka_id" placeholder="Pielęgniarka ID">
            <input class="form-control mb-2" [(ngModel)]="addForm.ordynator_id" name="ordynator_id" placeholder="Ordynator ID">
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeAddModal()">Anuluj</button>
          <button class="btn btn-gradient" (click)="saveAdd()">Dodaj</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade show test-pacjent-modal-fade-in" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showEditModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4 shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title">Edytuj oddział</h5>
          <button type="button" class="btn-close" (click)="closeEditModal()"></button>
        </div>
        <div class="modal-body">
          <form>
            <input class="form-control mb-2" [(ngModel)]="editForm.nazwa" name="nazwa" placeholder="Nazwa">
            <input class="form-control mb-2" [(ngModel)]="editForm.pielegniarka_id" name="pielegniarka_id" placeholder="Pielęgniarka ID">
            <input class="form-control mb-2" [(ngModel)]="editForm.ordynator_id" name="ordynator_id" placeholder="Ordynator ID">
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeEditModal()">Anuluj</button>
          <button class="btn btn-gradient" (click)="saveEdit()">Zapisz</button>
        </div>
      </div>
    </div>
  </div>
</div>
