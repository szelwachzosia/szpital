<div class="container mt-32 test-pacjent-fade-in">
  <div class="glass-card shadow-lg p-4 mb-4 rounded-5 test-pacjent-card-fade-in">
    <h2 class="fw-bold mb-4 text-primary-emphasis gradient-text">Przedmioty</h2>
    <button class="btn btn-gradient mb-3 test-pacjent-btn-fade-in" (click)="openAddModal()">
      <i class="bi bi-plus-circle me-1"></i> Dodaj przedmiot
    </button>
    <div *ngIf="errorMsg" class="alert alert-danger test-pacjent-alert-fade-in">{{ errorMsg }}</div>
    <div class="table-responsive">
      <table class="table table-hover table-striped shadow rounded-4 overflow-hidden">
        <thead class="table-primary">
          <tr>
            <th>Nazwa</th>
            <th>Typ</th>
            <th>Producent</th>
            <th>Ilość</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of przedmioty" class="align-middle test-pacjent-row-fade-in">
            <td>{{p.nazwa}}</td>
            <td>{{p.typ}}</td>
            <td>{{p.producent}}</td>
            <td>{{p.ilosc}}</td>
            <td>
              <button class="btn btn-gradient btn-sm me-1" (click)="openEditModal(p)">Edytuj</button>
              <button class="btn btn-danger btn-sm" (click)="confirmDelete(p)">Usuń</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal fade show test-pacjent-modal-fade-in" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showAddModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4 shadow-lg">
        <div class="modal-header">
          <h3 class="modal-title gradient-text">Dodaj przedmiot</h3>
          <button type="button" class="btn-close" (click)="closeAddModal()"></button>
        </div>
        <form (ngSubmit)="saveAdd()">
          <div class="modal-body">
            <div *ngIf="errorMsg" class="alert alert-danger">{{errorMsg}}</div>
            <div class="mb-3">
              <label class="form-label">Nazwa:</label>
              <input class="form-control" [(ngModel)]="addForm.nazwa" name="nazwa" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Typ:</label>
              <input class="form-control" [(ngModel)]="addForm.typ" name="typ" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Producent:</label>
              <input class="form-control" [(ngModel)]="addForm.producent" name="producent" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Ilość:</label>
              <input class="form-control" [(ngModel)]="addForm.ilosc" name="ilosc" required type="number" step="1">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-gradient" type="submit">Dodaj</button>
            <button class="btn btn-secondary" type="button" (click)="closeAddModal()">Anuluj</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade show test-pacjent-modal-fade-in" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showEditModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4 shadow-lg">
        <div class="modal-header">
          <h3 class="modal-title gradient-text">Edytuj przedmiot</h3>
          <button type="button" class="btn-close" (click)="closeEditModal()"></button>
        </div>
        <form (ngSubmit)="saveEdit()">
          <div class="modal-body">
            <div *ngIf="errorMsg" class="alert alert-danger">{{errorMsg}}</div>
            <div class="mb-3">
              <label class="form-label">Nazwa:</label>
              <input class="form-control" [(ngModel)]="editForm.nazwa" name="nazwa" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Typ:</label>
              <input class="form-control" [(ngModel)]="editForm.typ" name="typ" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Producent:</label>
              <input class="form-control" [(ngModel)]="editForm.producent" name="producent" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Ilość:</label>
              <input class="form-control" [(ngModel)]="editForm.ilosc" name="ilosc" required type="number" step="1">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-gradient" type="submit">Zapisz</button>
            <button class="btn btn-secondary" type="button" (click)="closeEditModal()">Anuluj</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
